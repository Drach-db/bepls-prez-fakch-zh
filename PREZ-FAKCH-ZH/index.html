<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BEPLS</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #001014;
        --fg: #ffffff;
        --muted: rgba(255, 255, 255, 0.62);
        --accent: #b3b46c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Arial,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 680px);
      }

      .brand {
        margin: 0 0 56px;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 0;
        max-width: 620px;
        font-size: clamp(40px, 8vw, 88px);
        font-weight: 400;
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        margin: 28px 0 0;
        max-width: 460px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.45;
      }

      .mark {
        width: 72px;
        height: 8px;
        margin-top: 48px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <main aria-label="BEPLS">
      <div class="brand">BEPLS</div>
      <h1>Страница скоро откроется</h1>
      <p>Мы готовим материал. Вернитесь к этой ссылке чуть позже.</p>
      <div class="mark" aria-hidden="true"></div>
    </main>
  </body>
</html>
