<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kitten</title>
    <meta name="robots" content="noindex" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 0;
        background: #001014;
      }

      img {
        display: block;
        width: min(100vw, 100vh);
        height: min(100vw, 100vh);
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <img src="../assets/kitten.png" alt="Kitten" />
  </body>
</html>
