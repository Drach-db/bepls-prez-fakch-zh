<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BEPLS</title>
    <meta name="robots" content="noindex" />
    <link
      rel="preload"
      href="../assets/fonts/lt-amber-light.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <link
      rel="preload"
      href="../assets/fonts/lt-amber-regular.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "LT Amber";
        src: url("../assets/fonts/lt-amber-light.otf") format("opentype");
        font-weight: 300;
        font-style: normal;
        font-display: block;
      }

      @font-face {
        font-family: "LT Amber";
        src: url("../assets/fonts/lt-amber-regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100svh;
        padding: clamp(24px, 6vw, 80px);
        background: #ffffff;
        color: #001014;
        font-family: "LT Amber", Arial, sans-serif;
      }

      main {
        display: flex;
        width: min(100%, 760px);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #001014;
        font-size: clamp(44px, 7.4vw, 84px);
        font-weight: 300;
        line-height: 0.96;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      p {
        margin: clamp(24px, 4.4vw, 48px) 0 0;
        max-width: 660px;
        color: #001014;
        font-size: clamp(20px, 3.2vw, 36px);
        font-weight: 300;
        line-height: 1.12;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .release-note {
        margin-top: clamp(16px, 2.4vw, 28px);
        font-size: clamp(16px, 2.2vw, 24px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Страница<br />в разработке&nbsp;:(</h1>
      <p>Извините, мы пока готовим этот материал.</p>
      <p class="release-note">Скоро. Июль 2026.</p>
    </main>
  </body>
</html>
