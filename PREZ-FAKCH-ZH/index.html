<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BEPLS</title>
    <meta name="robots" content="noindex" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100svh;
        padding: clamp(32px, 6vw, 80px);
        background: #ffffff;
        color: #001014;
        font-family:
          Arial,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        display: flex;
        min-height: calc(100svh - clamp(64px, 12vw, 160px));
        width: min(100%, 696px);
        flex-direction: column;
        justify-content: center;
      }

      h1 {
        margin: 0;
        color: #001014;
        font-size: clamp(54px, 8vw, 84px);
        font-weight: 300;
        line-height: 0.95;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      p {
        margin: clamp(36px, 7vw, 72px) 0 0;
        max-width: 620px;
        color: #001014;
        font-size: clamp(24px, 4.2vw, 44px);
        font-weight: 300;
        line-height: 1.08;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      @media (max-width: 640px) {
        body {
          padding: 32px 24px;
        }

        main {
          justify-content: flex-start;
          padding-top: 36px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Страница<br />в разработке&nbsp;:(</h1>
      <p>Извините, мы пока готовим этот материал.</p>
    </main>
  </body>
</html>
