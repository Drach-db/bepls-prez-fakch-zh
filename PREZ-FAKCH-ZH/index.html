<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BEPLS</title>
    <meta name="robots" content="noindex" />
    <link
      rel="preload"
      href="../assets/fonts/lt-amber-light.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <link
      rel="preload"
      href="../assets/fonts/lt-amber-regular.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "LT Amber";
        src: url("../assets/fonts/lt-amber-light.otf") format("opentype");
        font-weight: 300;
        font-style: normal;
        font-display: block;
      }

      @font-face {
        font-family: "LT Amber";
        src: url("../assets/fonts/lt-amber-regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100svh;
        padding: clamp(24px, 6vw, 80px);
        background: #ffffff;
        color: #001014;
        font-family: "LT Amber", Arial, sans-serif;
      }

      main {
        display: flex;
        width: min(100%, 760px);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .loader {
        display: block;
        width: min(68vw, 320px);
        max-height: 28svh;
        object-fit: contain;
      }

      .caption {
        margin: clamp(18px, 3vw, 32px) 0 0;
        color: #001014;
        font-size: clamp(18px, 2.4vw, 28px);
        font-weight: 300;
        line-height: 1.1;
        letter-spacing: 0;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="loader" src="../assets/bepls-loading.gif" alt="Загрузка BEPLS" />
      <p class="caption">Скоро. Июль 2026.</p>
    </main>
  </body>
</html>
